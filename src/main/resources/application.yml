spring:
  application:
    name: API Shield Core

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/apishielddb
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    user:
      name: admin
      password: admin123

server:
  port: 8080